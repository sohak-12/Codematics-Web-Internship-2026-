<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <!-- Background circles -->
  <circle cx="300" cy="200" r="180" fill="url(#g2)"/>
  <circle cx="300" cy="200" r="130" fill="url(#g2)"/>
  <!-- Broken film strip -->
  <g transform="translate(150,120)">
    <rect x="0" y="0" width="300" height="160" rx="20" fill="none" stroke="url(#g1)" stroke-width="4" stroke-dasharray="12 8" opacity="0.5"/>
    <!-- Film holes left -->
    <rect x="15" y="15" width="16" height="12" rx="3" fill="url(#g1)" opacity="0.3"/>
    <rect x="15" y="40" width="16" height="12" rx="3" fill="url(#g1)" opacity="0.3"/>
    <rect x="15" y="65" width="16" height="12" rx="3" fill="url(#g1)" opacity="0.3"/>
    <rect x="15" y="90" width="16" height="12" rx="3" fill="url(#g1)" opacity="0.3"/>
    <rect x="15" y="115" width="16" height="12" rx="3" fill="url(#g1)" opacity="0.3"/>
    <rect x="15" y="140" width="16" height="12" rx="3" fill="url(#g1)" opacity="0.3"/>
    <!-- Film holes right -->
    <rect x="269" y="15" width="16" height="12" rx="3" fill="url(#g1)" opacity="0.3"/>
    <rect x="269" y="40" width="16" height="12" rx="3" fill="url(#g1)" opacity="0.3"/>
    <rect x="269" y="65" width="16" height="12" rx="3" fill="url(#g1)" opacity="0.3"/>
    <rect x="269" y="90" width="16" height="12" rx="3" fill="url(#g1)" opacity="0.3"/>
    <rect x="269" y="115" width="16" height="12" rx="3" fill="url(#g1)" opacity="0.3"/>
    <rect x="269" y="140" width="16" height="12" rx="3" fill="url(#g1)" opacity="0.3"/>
    <!-- Sad face -->
    <circle cx="120" cy="65" r="8" fill="url(#g1)" opacity="0.6"/>
    <circle cx="180" cy="65" r="8" fill="url(#g1)" opacity="0.6"/>
    <path d="M120 110 Q150 95 180 110" fill="none" stroke="url(#g1)" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  </g>
  <!-- Floating stars -->
  <circle cx="120" cy="100" r="4" fill="#a855f7" opacity="0.6"/>
  <circle cx="480" cy="80" r="3" fill="#38bdf8" opacity="0.5"/>
  <circle cx="500" cy="300" r="5" fill="#a855f7" opacity="0.4"/>
  <circle cx="100" cy="320" r="3" fill="#38bdf8" opacity="0.5"/>
  <circle cx="200" cy="60" r="2" fill="#c084fc" opacity="0.7"/>
  <circle cx="420" cy="340" r="4" fill="#c084fc" opacity="0.4"/>
</svg>

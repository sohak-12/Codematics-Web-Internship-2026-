<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="mg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>
  <circle cx="200" cy="150" r="130" fill="url(#mg)" opacity="0.06"/>
  <!-- Clapperboard -->
  <g transform="translate(110,50)">
    <rect x="0" y="40" width="180" height="130" rx="12" fill="url(#mg)" opacity="0.15" stroke="url(#mg)" stroke-width="2"/>
    <!-- Top clapper -->
    <path d="M0 40 L180 40 L180 20 L0 20 Z" fill="url(#mg)" opacity="0.25" rx="6"/>
    <line x1="30" y1="20" x2="50" y2="40" stroke="#fff" stroke-width="3" opacity="0.4"/>
    <line x1="70" y1="20" x2="90" y2="40" stroke="#fff" stroke-width="3" opacity="0.4"/>
    <line x1="110" y1="20" x2="130" y2="40" stroke="#fff" stroke-width="3" opacity="0.4"/>
    <line x1="150" y1="20" x2="170" y2="40" stroke="#fff" stroke-width="3" opacity="0.4"/>
    <!-- Play button -->
    <polygon points="75,85 75,135 115,110" fill="url(#mg)" opacity="0.5"/>
  </g>
  <!-- Floating elements -->
  <circle cx="80" cy="60" r="4" fill="#a855f7" opacity="0.5"/>
  <circle cx="330" cy="80" r="3" fill="#38bdf8" opacity="0.4"/>
  <circle cx="60" cy="230" r="5" fill="#c084fc" opacity="0.3"/>
  <circle cx="350" cy="240" r="4" fill="#38bdf8" opacity="0.4"/>
  <!-- Stars -->
  <path d="M320 50 L323 58 L331 58 L325 63 L327 71 L320 66 L313 71 L315 63 L309 58 L317 58 Z" fill="#f59e0b" opacity="0.5"/>
  <path d="M90 260 L92 265 L97 265 L93 268 L94 273 L90 270 L86 273 L87 268 L83 265 L88 265 Z" fill="#f59e0b" opacity="0.4"/>
</svg>
